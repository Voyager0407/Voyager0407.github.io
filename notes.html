  <style>
    .notes-layout {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 40px;
      align-items: start;
    }
    .notes-sidebar {
      position: sticky;
      top: 80px;
    }
    .notes-category {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      margin: 20px 0 8px;
    }
    .notes-category:first-child { margin-top: 0; }
    .note-nav-item {
      display: block;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.88rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: var(--font-ui);
    }
    .note-nav-item:hover,
    .note-nav-item.active {
      color: var(--accent);
      background: rgba(123,47,190,0.08);
    }

    .notes-content { min-height: 400px; }
    .note-detail { display: none; }
    .note-detail.active { display: block; }
    .note-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      font-family: var(--font-main);
    }
    .note-meta {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-bottom: 28px;
      display: flex;
      gap: 16px;
    }
    .note-tag {
      background: rgba(123,47,190,0.1);
      color: var(--accent);
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 0.76rem;
    }
    .note-body {
      font-family: var(--font-main);
      font-size: 1rem;
      line-height: 1.95;
      color: var(--text);
    }
    .note-body h2 {
      font-size: 1.15rem;
      font-weight: 700;
      margin: 28px 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .note-body h3 {
      font-size: 1rem;
      font-weight: 600;
      margin: 20px 0 8px;
    }
    .note-body p { margin-bottom: 16px; }
    .note-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 0 4px 20px;
      margin: 20px 0;
      color: var(--text-muted);
      font-style: italic;
    }
    .note-body code {
      background: var(--bg-secondary);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.88em;
      font-family: 'Courier New', monospace;
    }

    .note-list-view { }
    .note-list-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: color 0.2s;
    }
    .note-list-item:hover .note-list-title { color: var(--accent); }
    .note-list-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
      transition: color 0.2s;
    }
    .note-list-excerpt {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .notes-layout { grid-template-columns: 1fr; }
      .notes-sidebar { position: static; }
    }
  </style>

      document.documentElement.setAttribute('data-theme', t);
    })();

  <script src="assets/js/main.js"></script>
  <script>
    // ===== 笔记数据，按格式添加 =====
    const notes = [
      {
  id: 'slam',
  category: '技术笔记',
  title: 'SLAM 技术选型分析报告',
  date: '2025-01-01',
  tags: ['机器人', 'SLAM', 'ROS2', '具身智能'],
  excerpt: '对激光SLAM、视觉SLAM和多传感器融合SLAM三大技术路线的全面对比，推荐以LIO-SAM作为核心框架。',
  content: `
    <h2>一、执行摘要</h2>
    <p>本报告系统梳理了当前主流SLAM（Simultaneous Localization and Mapping，即时定位与地图构建）技术，并结合具身机器人应用场景需求，对三大技术路线进行全面对比分析。</p>
    <ul>
      <li><strong>激光SLAM</strong>（LOAM、LeGO-LOAM、LIO-SAM）：精度高、鲁棒性强，适合结构化环境，但成本较高。</li>
      <li><strong>视觉SLAM</strong>（ORB-SLAM3、VINS-Mono、DSO）：成本低、语义信息丰富，但光照变化或纹理匮乏时退化严重。</li>
      <li><strong>多传感器融合SLAM</strong>（LVI-SAM、R3LIVE、FAST-LIVO）：综合性能最优，是具身机器人导航的主流方向。</li>
    </ul>
    <blockquote>综合项目需求，推荐采用 LIO-SAM（激光+IMU）作为主要SLAM框架，后期引入视觉模态进行融合扩展。</blockquote>

    <h2>二、激光SLAM技术调研</h2>
    <p>激光SLAM利用激光雷达通过ToF测量获取三维点云，核心流程包括点云预处理、特征提取、点云配准、位姿估计和后端优化。不受光照影响，测量精度通常优于5cm。</p>
    <p>主流算法对比：</p>
    <ul>
      <li><strong>LOAM</strong>：CMU 2014年，高频里程计+低频建图，精度优秀，无闭环检测。</li>
      <li><strong>LeGO-LOAM</strong>：2018年，针对地面机器人优化，可在嵌入式平台实时运行。</li>
      <li><strong>LIO-SAM</strong>：2020年，激光+IMU紧耦合，因子图优化，支持GPS和闭环，社区最活跃。</li>
      <li><strong>FAST-LIO2</strong>：港大MARS实验室2022年，基于IEKF+ikd-Tree，计算极低，适合高速平台。</li>
      <li><strong>Cartographer</strong>：Google 2016年，室内2D建图精度极高。</li>
    </ul>

    <h2>三、视觉SLAM技术调研</h2>
    <p>视觉SLAM以相机为主传感器，成本低且信息量大，与目标检测天然耦合，非常适合具身机器人多任务需求。</p>
    <ul>
      <li><strong>ORB-SLAM3</strong>：萨拉戈萨大学2020年，支持多地图系统，绝对轨迹误差通常低于2cm，首选框架。</li>
      <li><strong>VINS-Mono/Fusion</strong>：港科大2018年，单目+IMU紧耦合，无人机领域应用极广。</li>
      <li><strong>DSO</strong>：TUM 2016年，直接法稀疏里程计，对光照变化非常敏感。</li>
      <li><strong>ElasticFusion</strong>：帝国理工2015年，RGB-D稠密重建，依赖GPU。</li>
    </ul>

    <h2>四、多传感器融合SLAM</h2>
    <ul>
      <li><strong>LVI-SAM</strong>：MIT 2021年，LIO-SAM + VINS-Mono双系统互助，精度与鲁棒性最优。</li>
      <li><strong>R3LIVE</strong>：港大MARS 2022年，实时输出彩色稠密点云，适合语义场景理解。</li>
      <li><strong>FAST-LIVO</strong>：港大MARS 2022年，极低计算开销，嵌入式平台友好。</li>
    </ul>

    <h2>五、技术选型建议</h2>
    <p><strong>第一阶段</strong>：核心SLAM采用 LIO-SAM（激光+IMU），导航栈用 ROS 2 Nav2，可视化用 RViz2 + Foxglove。</p>
    <p><strong>第二阶段</strong>：引入 LVI-SAM 或 FAST-LIVO 融合视觉模态，结合 YOLOv8 做动态目标剔除，条件允许时用 R3LIVE 构建稠密地图。</p>
    <p><strong>硬件建议</strong>：激光雷达选 Livox Mid-360，相机选 Intel RealSense D435i，计算平台选 NVIDIA Jetson AGX Orin。</p>

    <h2>六、阶段总结</h2>
    <p>共调研12个主流算法框架，建立多维度评估体系；ROS 2 Humble + Ubuntu 22.04 开发环境已成功搭建，5项核心示例验证通过。</p>
  `
},
    ];
    // =================================

    // 按分类分组
    function groupByCategory(notes) {
      const groups = {};
      notes.forEach(n => {
        if (!groups[n.category]) groups[n.category] = [];
        groups[n.category].push(n);
      });
      return groups;
    }

    // 渲染侧边栏
    function renderSidebar(activeId) {
      const groups = groupByCategory(notes);
      let html = '';
      for (const [cat, items] of Object.entries(groups)) {
        html += `<div class="notes-category">${cat}</div>`;
        items.forEach(n => {
          html += `
            <button class="note-nav-item ${n.id === activeId ? 'active' : ''}"
                    onclick="showNote('${n.id}')">
              ${n.title}
            </button>`;
        });
      }
      document.getElementById('notes-sidebar').innerHTML = html;
    }

    // 显示笔记
    function showNote(id) {
      const note = notes.find(n => n.id === id);
      if (!note) return;
      const tagsHtml = note.tags.map(t => `<span class="note-tag">${t}</span>`).join(' ');
      document.getElementById('notes-content').innerHTML = `
        <div class="note-detail active">
          <div class="note-title">${note.title}</div>
          <div class="note-meta">
            <span>${note.date}</span>
            <span>${tagsHtml}</span>
          </div>
          <div class="note-body">${note.content}</div>
        </div>
      `;
      renderSidebar(id);
    }

    // 初始化
    if (notes.length > 0) {
      renderSidebar(notes[0].id);
      showNote(notes[0].id);
    } else {
      document.getElementById('notes-sidebar').innerHTML =
        '<p style="color:var(--text-muted);font-size:0.88rem;">暂无笔记</p>';
      document.getElementById('notes-content').innerHTML =
        '<p style="color:var(--text-muted);">添加笔记后将在这里显示。</p>';
    }
  </script>
