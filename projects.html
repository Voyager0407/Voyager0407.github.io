<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目 | 寻</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .project-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow 0.25s, border-color 0.25s, transform 0.25s;
      cursor: pointer;
    }
    .project-card:hover {
      box-shadow: var(--shadow);
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .project-cover {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    .project-cover img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }
    .project-body {
      padding: 16px 20px 20px;
    }
    .project-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .project-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 14px;
    }
    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }
    .project-tag {
      background: rgba(123,47,190,0.1);
      color: var(--accent);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.76rem;
    }
    .project-links {
      display: flex;
      gap: 10px;
    }
    .project-link {
      font-size: 0.82rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }
    .project-link:hover { color: var(--accent); }
    .category-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
      font-family: var(--font-ui);
    }
    .filter-btn:hover,
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
  </style>
  <script>
    (function() {
      const t = localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <div id="progress-bar"></div>

  <nav class="navbar">
    <div class="navbar-inner">
      <a class="navbar-brand" href="index.html">寻</a>
      <ul class="nav-links">
        <li><a href="index.html">关于</a></li>
        <li><a href="cv.html">简历</a></li>
        <li><a href="projects.html">项目</a></li>
        <li><a href="books.html">书架</a></li>
        <li><a href="gallery.html">图片库</a></li>
        <li><a href="music.html">音乐库</a></li>
        <li><a href="notes.html">笔记</a></li>
        <li><a href="blog.html">日志</a></li>
      </ul>
      <div class="nav-right">
        <button class="nav-btn" id="search-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          搜索
        </button>
        <button class="nav-btn" id="theme-toggle">🌙</button>
      </div>
    </div>
  </nav>

  <main class="page-wrapper">
    <div class="page-header">
      <h1 class="page-title">项目</h1>
      <p class="page-subtitle">我做过的一些东西</p>
    </div>

    <!-- 分类筛选 -->
    <div class="category-filter">
      <button class="filter-btn active" onclick="filterProjects('all', this)">全部</button>
      <button class="filter-btn" onclick="filterProjects('code', this)">代码</button>
      <button class="filter-btn" onclick="filterProjects('research', this)">研究</button>
      <button class="filter-btn" onclick="filterProjects('design', this)">设计</button>
    </div>

    <!-- 项目网格 -->
    <div class="projects-grid" id="projects-grid">

      <!-- 项目示例 1 -->
      <div class="project-card" data-category="code">
        <div class="project-cover">🗺️</div>
        <div class="project-body">
          <div class="project-title">折线可视化系统</div>
          <div class="project-desc">基于 Bresenham 算法的交互式折线绘制工具，支持数据文件读取与手动输入。</div>
          <div class="project-tags">
            <span class="project-tag">C++</span>
            <span class="project-tag">EasyX</span>
            <span class="project-tag">算法</span>
          </div>
          <div class="project-links">
            <a class="project-link" href="https://github.com/Voyager0407" target="_blank">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
              </svg>
              GitHub
            </a>
          </div>
        </div>
      </div>

      <!-- 更多项目占位 -->
      <div class="project-card" data-category="research">
        <div class="project-cover">🛰️</div>
        <div class="project-body">
          <div class="project-title">遥感图像分析</div>
          <div class="project-desc">基于 Python 的遥感图像处理与分析，包含波段合成、NDVI 计算等功能。</div>
          <div class="project-tags">
            <span class="project-tag">Python</span>
            <span class="project-tag">遥感</span>
            <span class="project-tag">GIS</span>
          </div>
          <div class="project-links">
            <a class="project-link" href="#" target="_blank">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
              </svg>
              GitHub
            </a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- 搜索弹窗 -->
  <div id="search-overlay" class="search-overlay">
    <div class="search-box">
      <div class="search-input-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="search-input" class="search-input" placeholder="输入以开始搜索..." autocomplete="off">
      </div>
      <div id="search-results" class="search-results"></div>
      <div class="search-footer">
        <span><kbd>↑</kbd><kbd>↓</kbd> 导航</span>
        <span><kbd>↩</kbd> 选择</span>
        <span><kbd>esc</kbd> 关闭</span>
      </div>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    function filterProjects(category, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.project-card').forEach(card => {
        if (category === 'all' || card.dataset.category === category) {
          card.style.display = '';
        } else {
          card.style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
